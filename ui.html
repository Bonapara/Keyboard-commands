<html>
<head>
    <!-- JSZip library for bundling multiple files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <script>
        // UI code directly embedded
        console.log("UI Initialized");
        
        // Helper functions to determine file types
        function typedArrayToBuffer(array) {
            return array.buffer.slice(array.byteOffset, array.byteLength + array.byteOffset)
        }
        
        function exportTypeToFileExtension(type) {
            switch(type) {
                case "PDF": return '.pdf'
                case "SVG": return '.svg'
                case "PNG": return '.png'
                case "JPG": return '.jpg'
                default: return '.png'
            }
        }
        
        // Handle messages from the plugin
        window.onmessage = async (event) => {
            if (!event.data.pluginMessage) return
            
            const exportResults = event.data.pluginMessage;
            
            // Single file: download directly
            if (exportResults.length === 1) {
                const { bytes, name, format } = exportResults[0];
                const cleanBytes = typedArrayToBuffer(bytes);
                const extension = exportTypeToFileExtension(format);
                
                const blob = new Blob([cleanBytes], { type: 'application/octet-stream' });
                const blobURL = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobURL;
                link.download = `${name}${extension}`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobURL);
            } 
            // Multiple files: bundle into ZIP
            else {
                const zip = new JSZip();
                const format = exportResults[0].format;
                const extension = exportTypeToFileExtension(format);
                
                // Add each file to the ZIP
                for (const data of exportResults) {
                    const { bytes, name } = data;
                    const cleanBytes = typedArrayToBuffer(bytes);
                    zip.file(`${name}${extension}`, cleanBytes);
                }
                
                // Generate and download the ZIP
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const blobURL = window.URL.createObjectURL(zipBlob);
                const link = document.createElement('a');
                link.href = blobURL;
                link.download = `export-${exportResults.length}-files.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobURL);
            }
            
            // Notify the plugin that we're done
            window.parent.postMessage({ pluginMessage: 'Done!' }, '*');
        }
    </script>
</body>
</html>
