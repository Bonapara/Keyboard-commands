name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      # `build` runs the `prebuild` hook first, which type-checks (tsc --noEmit)
      # and runs the full test suite before bundling with esbuild.
      - run: npm run build
